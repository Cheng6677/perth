<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>伯斯旅行手帖 · Perth Travel Notebook</title>
<meta name="theme-color" content="#FAF6F0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg:#FAF6EF;
  --surface:#FFFFFF;
  --ink:#2B2622;
  --ink-soft:#7A7167;
  --ink-faint:#A89F94;
  --line:rgba(43,38,34,.10);
  --line-strong:rgba(43,38,34,.16);
  --accent:#BD4332;
  --accent-soft:#F5E2DC;
  --accent-deep:#8F2F22;
  --indigo:#3C4A6B;
  --indigo-soft:#E2E6EF;
  --sage:#717F5E;
  --sage-soft:#E6EBDD;
  --gold:#A4762E;
  --gold-soft:#F2E5C5;
  --radius-lg:18px;
  --radius-md:12px;
  --radius-sm:8px;
  --shadow:0 1px 2px rgba(43,38,34,.04), 0 6px 16px rgba(43,38,34,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:#EDE7DC;
  color:var(--ink);
  font-family:'Noto Sans TC',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
}
h1,h2,h3,h4{font-family:'Shippori Mincho',serif;margin:0;font-weight:600;letter-spacing:.02em;}
p{margin:0 0 0;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;}

/* 採用標準響應式包裝，解決行動端滾動條與阻斷點擊問題 */
.app-frame{
  max-width:540px;
  margin:0 auto;
  min-height:100vh;
  min-height:100dvh;
  background:var(--bg);
  position:relative;
}
@media (min-width:560px){
  body{padding:24px 0;}
  .app-frame{
    border-radius:28px;
    box-shadow:0 1px 4px rgba(43,38,34,.08), 0 30px 60px -20px rgba(43,38,34,.35);
    border:1px solid rgba(255,255,255,.6);
    padding-bottom: 80px;
  }
}

/* ---------- top bar ---------- */
.topbar{
  padding:max(14px, env(safe-area-inset-top)) 20px 12px;
  background:var(--bg);
  position:sticky; top:0; z-index:20;
}
.topbar-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
.topbar .eyebrow{font-size:11px;letter-spacing:.18em;color:var(--accent);font-weight:700;text-transform:uppercase;}
.topbar h1{font-size:22px;color:var(--ink);margin-top:2px;font-weight:700;}
.topbar .status{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;text-align:right;line-height:1.4;}
.topbar .status b{color:var(--accent-deep);font-weight:700;}
.hairline{height:1px;background:var(--line);margin-top:12px;}

/* ---------- main scroll area ---------- */
main{
  padding:4px 20px max(110px, env(safe-area-inset-bottom) + 90px);
}
.page{display:none;animation:fade .25s ease;}
.page.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.section-lead{margin:14px 0 18px;}
.section-lead h2{font-size:19px;font-weight:700;}
.section-lead p{font-size:14px;color:var(--ink-soft);margin-top:6px;}

/* ---------- bottom tab nav (絕對釘選置底架構，完美防誤觸) ---------- */
nav.tabbar{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:540px;
  display:flex;
  background:var(--surface);
  border-top:1px solid var(--line);
  padding:8px 2px max(12px, env(safe-area-inset-bottom)) 2px;
  z-index:50;
  overflow-x:auto;
  box-shadow: 0 -4px 16px rgba(43,38,34,.06);
}
nav.tabbar button{
  flex:1; min-width:55px;
  background:none;border:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 2px;
  color:var(--ink-faint);
  font-size:11px;
  cursor:pointer;
  border-radius:10px;
  -webkit-tap-highlight-color: transparent;
}
nav.tabbar button svg{width:22px;height:22px;}
nav.tabbar button.active{color:var(--accent-deep);font-weight:700;}
nav.tabbar button.active svg{stroke:var(--accent-deep);}

/* ---------- shared components ---------- */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  padding:18px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}
.card h3{font-size:16.5px;font-weight:700;}
.muted{color:var(--ink-soft);font-size:13px;}
.tiny{font-size:12px;color:var(--ink-faint);}

.tag{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:999px;letter-spacing:.02em;margin:4px 6px 4px 0;}
.tag-eat{background:var(--accent-soft);color:var(--accent-deep);}
.tag-menu{background:var(--gold-soft);color:var(--gold);}
.tag-buy{background:var(--sage-soft);color:var(--sage);}
.tag-book{background:var(--indigo-soft);color:var(--indigo);}

.navbtn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:700;color:var(--accent-deep);
  border:1px solid var(--accent-soft);background:var(--accent-soft);
  padding:8px 16px;border-radius:999px;margin-top:8px;
  min-height:36px;
}
.navbtn svg{width:14px;height:14px;}
.navbtn.alt{color:var(--indigo);background:var(--indigo-soft);border-color:var(--indigo-soft);}

.divider{height:1px;background:var(--line);margin:14px 0;}

.seal{
  flex:0 0 auto;width:36px;height:36px;border-radius:50%;
  background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-weight:700;font-size:16px;
  border:2px solid var(--accent-deep);
}
.day-head{display:flex;align-items:flex-start;gap:12px;}
.day-head .titles{flex:1;}
.day-head h3{font-size:16px;line-height:1.4;font-weight:700;}
.day-head .day-sub{font-size:13px;color:var(--ink-soft);margin-top:2px;}
.budget-chip{flex:0 0 auto;font-size:12px;font-weight:700;color:var(--gold);background:var(--gold-soft);padding:4px 10px;border-radius:999px;white-space:nowrap;}

.block{margin-top:14px;}
.block h4{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:6px;font-family:'Noto Sans TC',sans-serif;}
.block p{font-size:14.5px;color:var(--ink);}
.story{margin-top:12px;font-size:13.5px;color:var(--ink-soft);background:#F8F3EA;border-left:3px solid var(--gold);padding:10px 12px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;}

.meal{padding:12px 0;border-top:1px solid var(--line);}
.meal:first-child{border-top:none;}
.meal-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.meal-tag{font-size:11px;font-weight:700;color:#fff;background:var(--ink);padding:2px 8px;border-radius:6px;}
.meal-name{font-weight:700;font-size:14.5px;margin-top:6px;color:var(--ink);}
.meal-note{font-size:13.5px;color:var(--ink-soft);margin-top:3px;}

.done-toggle{display:flex;align-items:center;gap:7px;margin-top:14px;font-size:13px;color:var(--ink-soft);cursor:pointer;}
.done-toggle input{width:20px;height:18px;accent-color:var(--accent);}

/* packing list */
.pack-cat{margin-bottom:18px;}
.pack-cat h3{font-size:14.5px;color:var(--indigo);margin-bottom:8px;font-weight:700;}
.pack-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
/* 放大核取方塊至 22px 解決行動端誤觸與難以點擊的問題 */
.pack-item input[type=checkbox]{margin-top:2px;width:22px;height:22px;accent-color:var(--accent);flex:0 0 auto;}
.pack-text{flex:1;font-size:14.5px;outline:none;border-radius:6px;padding:2px 4px;color:var(--ink);}
.pack-text:focus{background:var(--accent-soft);}
.pack-item.checked .pack-text{color:var(--ink-faint);text-decoration:line-through;}
.add-item{font-size:13px;color:var(--accent-deep);font-weight:700;background:none;border:1px dashed var(--line-strong);width:100%;padding:10px;border-radius:var(--radius-sm);margin-top:6px;cursor:pointer;}

/* segmented control */
.segment {display:flex;background:#F0EAE0;border-radius:999px;padding:3px;margin-bottom:16px;}
.segment button{flex:1;border:none;background:none;padding:8px 4px;border-radius:999px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
.segment button.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.subpage{display:none;}
.subpage.active{display:block;}

/* phrase list */
.phrase{padding:12px 0;border-bottom:1px solid var(--line);}
.phrase:last-child{border-bottom:none;}
.phrase .en{font-weight:700;font-size:14.5px;color:var(--accent-deep);}
.phrase .zh{font-size:13.5px;color:var(--ink);margin-top:2px;}
.phrase .ctx{font-size:11.5px;color:var(--ink-faint);margin-top:3px;font-style:italic;}

/* flight timeline */
.timeline{position:relative;padding-left:18px;margin-top:10px;}
.timeline::before{content:"";position:absolute;left:4px;top:6px;bottom:6px;width:1px;background:var(--line-strong);}
.tl-item{position:relative;padding-bottom:16px;}
.tl-item:last-child{padding-bottom:0;}
.tl-item::before{content:"";position:absolute;left:-18px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);}
.tl-time{font-weight:700;font-size:15px;}
.tl-date{font-size:11.5px;color:var(--accent-deep);font-weight:700;}
.tl-place{font-size:14px;margin-top:2px;}
.tl-flight{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
.layover{background:var(--indigo-soft);color:var(--indigo);font-size:13px;border-radius:var(--radius-sm);padding:8px 10px;margin:6px 0 12px;}
.layover b{font-weight:700;}

.bag-row{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 0;border-bottom:1px solid var(--line);}
