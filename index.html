<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>伯斯旅行手帖 · Perth Travel Notebook</title>
<meta name="theme-color" content="#FAF6F0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght=500;600;700&family=Noto+Sans+TC:wght=400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg:#FAF6EF;
  --surface:#FFFFFF;
  --ink:#2B2622;
  --ink-soft:#7A7167;
  --ink-faint:#A89F94;
  --line:rgba(43,38,34,.10);
  --line-strong:rgba(43,38,34,.16);
  --accent:#BD4332;
  --accent-soft:#F5E2DC;
  --accent-deep:#8F2F22;
  --indigo:#3C4A6B;
  --indigo-soft:#E2E6EF;
  --sage:#717F5E;
  --sage-soft:#E6EBDD;
  --gold:#A4762E;
  --gold-soft:#F2E5C5;
  --radius-lg:18px;
  --radius-md:12px;
  --radius-sm:8px;
  --shadow:0 1px 2px rgba(43,38,34,.04), 0 6px 16px rgba(43,38,34,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:#EDE7DC;
  color:var(--ink);
  font-family:'Noto Sans TC',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
}
h1,h2,h3,h4{font-family:'Shippori Mincho',serif;margin:0;font-weight:600;letter-spacing:.02em;}
p{margin:0 0 0;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;}

.app-frame{
  max-width:540px;
  margin:0 auto;
  min-height:100vh;
  background:var(--bg);
  position:relative;
}
@media (min-width:560px){
  body{padding:24px 0;}
  .app-frame{
    border-radius:28px;
    box-shadow:0 1px 4px rgba(43,38,34,.08), 0 30px 60px -20px rgba(43,38,34,.35);
    border:1px solid rgba(255,255,255,.6);
  }
}

/* ---------- top bar ---------- */
.topbar{
  padding:max(14px, env(safe-area-inset-top)) 20px 12px;
  background:var(--bg);
  position:sticky; top:0; z-index:20;
}
.topbar-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
.topbar .eyebrow{font-size:11px;letter-spacing:.18em;color:var(--accent);font-weight:700;text-transform:uppercase;}
.topbar h1{font-size:22px;color:var(--ink);margin-top:2px;font-weight:700;}
.topbar .status{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;text-align:right;line-height:1.4;}
.topbar .status b{color:var(--accent-deep);font-weight:700;}
.hairline{height:1px;background:var(--line);margin-top:12px;}

/* ---------- main scroll area ---------- */
main{
  padding:4px 20px 120px;
}
.page{display:none;animation:fade .25s ease;}
.page.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.section-lead{margin:14px 0 18px;}
.section-lead h2{font-size:19px;font-weight:700;}
.section-lead p{font-size:14px;color:var(--ink-soft);margin-top:6px;}

/* ---------- bottom tab nav 固定置底架構 ---------- */
nav.tabbar{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:540px;
  display:flex;
  background:var(--surface);
  border-top:1px solid var(--line);
  padding:8px 2px max(12px, env(safe-area-inset-bottom)) 2px;
  z-index:50;
  overflow-x:auto;
  box-shadow: 0 -4px 16px rgba(43,38,34,.06);
}
nav.tabbar button{
  flex:1; min-width:55px;
  background:none;border:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 2px;
  color:var(--ink-faint);
  font-size:11px;
  cursor:pointer;
  border-radius:10px;
}
nav.tabbar button svg{width:22px;height:22px;}
nav.tabbar button.active{color:var(--accent-deep);font-weight:700;}
nav.tabbar button.active svg{stroke:var(--accent-deep);}

/* ---------- shared components ---------- */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  padding:18px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}
.card h3{font-size:16.5px;font-weight:700;}
